services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: ecommerce-app
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    environment:
      APP_ENV: docker
      APP_PORT: 3000
      DB_HOST: db-primary
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: ecommerce
      DB_SCHEMA: public
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONN: 20
      DB_MAX_IDLE_CONN: 10
      DB_SLAVE_HOSTS: db-replica
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - ecommerce-net

  db-primary:
    image: postgres:18-alpine
    container_name: ecommerce-db-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
    volumes:
      - db-primary-data:/var/lib/postgresql/data
      - ./database/init/primary:/docker-entrypoint-initdb.d
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - ecommerce-net

  db-replica:
    image: postgres:18-alpine
    container_name: ecommerce-db-replica
    depends_on:
      db-primary:
        condition: service_healthy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
      PRIMARY_HOST: db-primary
    entrypoint: ["/bin/sh", "/docker-entrypoint-initdb.d/setup-replica.sh"]
    volumes:
      - db-replica-data:/var/lib/postgresql/data
      - ./database/init/replica/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh:ro
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - ecommerce-net

volumes:
  db-primary-data:
  db-replica-data:

networks:
  ecommerce-net:
    driver: bridge
